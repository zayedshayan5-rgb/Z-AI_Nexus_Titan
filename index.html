<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-AI Nexus Titan | Global Neural Hub</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Orbitron:wght@700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --accent: #58a6ff; 
            --border: #30363d; --text: #c9d1d9; --neon: #79c0ff;
            --success: #3fb950;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Scanline Effect */
        .scanline { position: fixed; top: 0; width: 100%; height: 3px; background: rgba(88, 166, 255, 0.1); z-index: 99; animation: scan 6s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: -2%; } to { top: 100%; } }

        /* Header */
        header {
            height: 60px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
        }
        .logo { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }

        /* App Grid */
        .main-grid { display: grid; grid-template-columns: 80px 380px 1fr 300px; height: calc(100vh - 60px); }

        /* Side Navigation */
        .nav-rail { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; }
        .nav-btn { width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: #8b949e; cursor: pointer; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: #21262d; color: var(--accent); border: 1px solid var(--border); }

        /* Control Console */
        .console { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; }
        .label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; font-weight: 800; }
        
        /* Language Support Textarea */
        .prompt-area {
            width: 100%; height: 160px; background: #010409; border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; color: #fff; font-size: 14px; resize: none; outline: none; margin-bottom: 20px;
        }

        .dropdown { width: 100%; background: #0d1117; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }

        .btn-gen {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #1f6feb, #8957e5);
            border: none; border-radius: 12px; color: #fff; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(31, 111, 235, 0.3); }

        /* Studio Viewport */
        .studio { background: #010409; position: relative; display: flex; justify-content: center; align-items: center; }
        .studio::before { content: ''; position: absolute; width: 100%; height: 100%; background-image: radial-gradient(#161b22 1px, transparent 1px); background-size: 35px 35px; }
        
        .frame { width: 90%; max-width: 700px; aspect-ratio: 1/1; background: #000; border: 1px solid var(--border); position: relative; z-index: 2; border-radius: 10px; overflow: hidden; }
        .display-img { width: 100%; height: 100%; object-fit: cover; }

        /* Processing HUD */
        .hud-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.98);
            z-index: 10; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 100px; height: 100px; border: 3px solid #161b22; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Right Panel */
        .logs-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .terminal { flex: 1; background: #000; padding: 20px; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--neon); overflow-y: auto; line-height: 2; }
        .stat-bar { padding: 20px; border-bottom: 1px solid var(--border); }
        .progress-container { height: 4px; background: #21262d; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="scanline"></div>

<header>
    <div class="logo"><i class="fas fa-microchip"></i> Z-AI <span>NEXUS TITAN</span></div>
    <div style="display: flex; gap: 20px; font-size: 10px; font-weight: 800;">
        <span style="color: var(--success);"><i class="fas fa-globe"></i> GLOBAL VERSION: ENABLED</span>
        <span id="clock" style="color: var(--neon);">00:00:00</span>
    </div>
</header>

<div class="main-grid">
    <aside class="nav-rail">
        <div class="nav-btn active"><i class="fas fa-palette"></i></div>
        <div class="nav-btn"><i class="fas fa-video"></i></div>
        <div class="nav-btn"><i class="fas fa-terminal"></i></div>
        <div style="margin-top: auto; margin-bottom: 25px;" class="nav-btn"><i class="fas fa-shield-halved"></i></div>
    </aside>

    <section class="console">
        <span class="label">Multilingual Prompt</span>
        <textarea id="user-prompt" class="prompt-area" placeholder="Write in any language (English, বাংলা, العربية, etc.)..."></textarea>

        <span class="label">AI Art Engine</span>
        <select id="art-eng" class="dropdown">
            <option value="Midjourney">Midjourney v6.1 (Ultra Realistic)</option>
            <option value="DALL-E 3">DALL-E 3 (OpenAI)</option>
            <option value="Leonardo">Leonardo.ai (Digital Artist)</option>
            <option value="Canva">Canva Magic Media</option>
        </select>

        <span class="label">AI Video Engine</span>
        <select id="vid-eng" class="dropdown">
            <option value="Runway">Runway Gen-3 (Pro Cinematic)</option>
            <option value="Luma">Luma Dream Machine (Hyper-Real)</option>
            <option value="Pika">Pika Art (Animation)</option>
            <option value="InVideo">InVideo AI (Script-based)</option>
        </select>

        <button class="btn-gen" onclick="processAI()">START GLOBAL SYNTHESIS</button>
    </section>

    <main class="studio">
        <div id="loader-hud" class="hud-loader">
            <div class="spinner"></div>
            <h2 style="margin-top: 25px; font-family: 'Orbitron'; letter-spacing: 5px;">PROCESSING</h2>
            <p id="hud-status" style="font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); margin-top: 15px;"></p>
            <div style="width: 300px; margin-top: 20px" class="progress-container">
                <div id="load-bar" class="progress-fill"></div>
            </div>
        </div>
        <div class="frame">
            <img id="result-media" src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=1200" class="display-img">
        </div>
    </main>

    <aside class="logs-panel">
        <div class="stat-bar">
            <span class="label">Cloud Node Status</span>
            <div class="progress-container"><div class="progress-fill" style="width: 89%; background: var(--accent);"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 9px; margin-top: 8px;">
                <span>SERVER_CTG_07</span> <span>89% CAP</span>
            </div>
        </div>
        <div id="term-box" class="terminal">
            [SYSTEM] Z-AI Global OS Initialized...<br>
            [SYSTEM] Multilingual Neural Engine: ONLINE.<br>
            [SYSTEM] Ready for translation & synthesis.<br>
        </div>
    </aside>
</div>

<script>
    const processLogs = [
        "Detecting Input Language...",
        "Translating Prompt to Neural Syntax...",
        "Connecting to Global Cloud Clusters...",
        "Decoding Latent Space (Step 12/28)...",
        "Refining Visual Fidelity...",
        "Synthesis Finalized."
    ];

    function processAI() {
        const input = document.getElementById('user-prompt').value;
        const engine = document.getElementById('art-eng').value;
        
        if(!input) { alert("Please enter your prompt!"); return; }

        const loader = document.getElementById('loader-hud');
        const term = document.getElementById('term-box');
        const pBar = document.getElementById('load-bar');
        const status = document.getElementById('hud-status');

        loader.style.display = 'flex';
        term.innerHTML += `<br>[INPUT] Language detection active for: "${input.substring(0, 20)}..."`;

        let logStep = 0;
        let loadProgress = 0;

        const interval = setInterval(() => {
            loadProgress += Math.random() * 15;
            if(loadProgress > 100) loadProgress = 100;
            pBar.style.width = loadProgress + "%";

            if(logStep < processLogs.length && Math.random() > 0.4) {
                status.innerText = "> " + processLogs[logStep];
                term.innerHTML += `<br>[LOG] ${processLogs[logStep]}`;
                term.scrollTop = term.scrollHeight;
                logStep++;
            }

            if(loadProgress >= 100) {
                clearInterval(interval);
                const seed = Math.floor(Math.random() * 1000000);
                const outImg = document.getElementById('result-media');
                
                // Simulation of global image fetch
                outImg.src = `https://picsum.photos/seed/${seed}/1200/1200`;
                
                outImg.onload = () => {
                    loader.style.display = 'none';
                    pBar.style.width = "0%";
                    term.innerHTML += `<br>[SYS] Success! Asset generated via ${engine}.`;
                    document.getElementById('user-prompt').value = "";
                }
            }
        }, 500);
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
